<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Uplift Register — Early Access</title>

  <meta
    name="description"
    content="Access Development Opportunities Before the Market. Powered by Institutional-Grade Intelligence Across London & the South East."
  />

  <!-- Waitlist CSS -->
  <link
    rel="stylesheet"
    href="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.css"
  />

  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #111111;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
      --radius: 18px;
      --max-width: 640px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
    }

    .card {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .body {
      padding: 28px 28px 26px;
      text-align: center;
    }

    /* TOP HEADLINE */
    .headline-top {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.02em;
      margin-bottom: 22px;
    }

    /* WAITLIST EMBED CONTAINER */
    .waitlist-embed {
      width: 100%;
    }

    /* FORCE CLEAN WIDTH + REMOVE THEIR OUTER CARD */
    .waitlist-embed iframe,
    .waitlist-embed > div {
      width: 100% !important;
      max-width: 100% !important;
    }

    /* 🔑 CRITICAL: REMOVE WAITLIST OUTER BOX (THIS FIXES YOUR ISSUE CLEANLY) */
    #getWaitlistContainer > div {
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
      padding: 0 !important;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px;
      }

      .body {
        padding: 22px 18px;
      }

      .headline-top {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="body">

        <!-- PART 1 -->
        <div class="headline-top">
          Access Development Opportunities Before the Market
        </div>

        <!-- WAITLIST (includes skyline + logo + second heading) -->
        <div class="waitlist-embed">
          <div
            id="getWaitlistContainer"
            data-waitlist_id="32739"
            data-widget_type="WIDGET_1">
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Waitlist Script -->
  <script src="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.js"></script>

</body>
</html>
