<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uplift Register — Early Access</title>

  <meta
    name="description"
    content="Access Development Opportunities Before the Market powered by Institutional-Grade Intelligence Across London & the South East."
  />

  <link
    rel="stylesheet"
    type="text/css"
    href="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.css"
  />

  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #111111;
      --border: #e2e2e2;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
      --radius: 18px;
      --max-width: 640px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
    }

    .card {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top {
      background: #fafafa;
      padding: 28px 24px 18px;
      display: flex;
      justify-content: center;
    }

    .logo {
      border: 1.5px solid #111;
      border-radius: 12px;
      padding: 10px 26px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    .body {
      padding: 34px 28px 24px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      line-height: 1.4;
      font-weight: 700;
      margin: 0 0 20px;
      letter-spacing: -0.02em;
    }

    .waitlist-embed {
      width: 100%;
      margin-top: 0;
    }

    /* Keep embed width controlled */
    .waitlist-embed iframe,
    .waitlist-embed div {
      width: 100% !important;
    }

    /* Remove duplicate branding and duplicate heading inside Waitlist widget */
    #getWaitlistContainer h1,
    #getWaitlistContainer h2,
    #getWaitlistContainer img {
      display: none !important;
    }

    /* Make embedded form feel native to the page */
    #getWaitlistContainer {
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
    }

    /* Improve field usability and perceived quality */
    #getWaitlistContainer input,
    #getWaitlistContainer select {
      min-height: 46px !important;
    }

    /* Sharpen CTA behaviour without adding visual noise */
    #getWaitlistContainer button,
    #getWaitlistContainer [type="submit"] {
      box-shadow: none !important;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    #getWaitlistContainer button:hover,
    #getWaitlistContainer [type="submit"]:hover {
      opacity: 0.92;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px;
        align-items: flex-start;
      }

      .body {
        padding: 26px 18px 22px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.45;
        margin-bottom: 18px;
      }

      .logo {
        font-size: 13px;
        padding: 10px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="top">
        <div class="logo">UPLIFT REGISTER</div>
      </div>

      <div class="body">
        <h1>
          Access Development Opportunities Before the Market<br>
          Powered by Institutional-Grade Intelligence Across London &amp; the South East
        </h1>

        <div class="waitlist-embed">
          <div id="getWaitlistContainer" data-waitlist_id="32739" data-widget_type="WIDGET_1"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.js"></script>
</body>
</html>
