<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uplift Register — Early Access</title>

  <meta
    name="description"
    content="Access off-market development opportunities before the market finds them. Powered by institutional-grade intelligence across London and the South East."
  />

  <link
    rel="stylesheet"
    href="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.css"
  />

  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #111111;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
      --radius: 18px;
      --max-width: 640px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
    }

    .card {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .body {
      padding: 28px 28px 26px;
      text-align: center;
    }

    .headline-top {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.02em;
      margin-bottom: 22px;
    }

    .waitlist-embed {
      width: 100%;
    }

    .waitlist-embed iframe,
    .waitlist-embed > div {
      width: 100% !important;
      max-width: 100% !important;
    }

    #getWaitlistContainer > div {
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
      padding: 0 !important;
    }

    #getWaitlistContainer h1,
    #getWaitlistContainer h2 {
      font-size: 18px !important;
      font-weight: 600 !important;
      line-height: 1.4 !important;
    }

    #getWaitlistContainer button::after,
    #getWaitlistContainer [type="submit"]::after {
      content: "Private early access — limited intake";
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
      color: #111111 !important;
      opacity: 1 !important;
      letter-spacing: 0.01em;
      line-height: 1.3;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 14px;
      }

      .body {
        padding: 22px 18px;
      }

      .headline-top {
        font-size: 18px;
        margin-bottom: 18px;
      }

      #getWaitlistContainer h1,
      #getWaitlistContainer h2 {
        font-size: 17px !important;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="body">

        <div class="headline-top">
          Access Off-Market Development Opportunities<br>
          Before the Market Finds Them
        </div>

        <div class="waitlist-embed">
          <div
            id="getWaitlistContainer"
            data-waitlist_id="32739"
            data-widget_type="WIDGET_1">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://prod-waitlist-widget.s3.us-east-2.amazonaws.com/getwaitlist.min.js"></script>

  <script type="text/javascript">
    _linkedin_partner_id = "8997842";
    window._linkedin_data_partner_ids = window._linkedin_data_partner_ids || [];
    window._linkedin_data_partner_ids.push(_linkedin_partner_id);
  </script>
  <script type="text/javascript">
    (function(l) {
      if (!l) {
        window.lintrk = function(a, b) { window.lintrk.q.push([a, b]); };
        window.lintrk.q = [];
      }
      var s = document.getElementsByTagName("script")[0];
      var b = document.createElement("script");
      b.type = "text/javascript";
      b.async = true;
      b.src = "https://snap.licdn.com/li.lms-analytics/insight.min.js";
      s.parentNode.insertBefore(b, s);
    })(window.lintrk);
  </script>
  <noscript>
    <img
      height="1"
      width="1"
      style="display:none;"
      alt=""
      src="https://px.ads.linkedin.com/collect/?pid=8997842&fmt=gif"
    />
  </noscript>

  <script>
  (function () {
    var CONVERSION_ID = 27058906;
    var STORAGE_KEY = "li_conv_27058906_fired";

    function fireLinkedInConversion() {
      if (sessionStorage.getItem(STORAGE_KEY)) return;
      if (typeof window.lintrk !== "function") return;

      window.lintrk("track", { conversion_id: CONVERSION_ID });
      sessionStorage.setItem(STORAGE_KEY, "1");
      console.log("LinkedIn conversion fired:", CONVERSION_ID);
    }

    function isSuccessStateVisible() {
      var text = document.body ? document.body.innerText : "";
      return (
        text.indexOf("Access Request Received") !== -1 &&
        text.indexOf("Your Position") !== -1 &&
        text.indexOf("People on Waitlist") !== -1
      );
    }

    function checkAndFire() {
      if (isSuccessStateVisible()) {
        fireLinkedInConversion();
        return true;
      }
      return false;
    }

    function startObserver() {
      if (checkAndFire()) return;

      var observer = new MutationObserver(function () {
        if (checkAndFire()) {
          observer.disconnect();
        }
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });

      setTimeout(function () {
        observer.disconnect();
      }, 30000);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", startObserver);
    } else {
      startObserver();
    }
  })();
  </script>
</body>
</html>
