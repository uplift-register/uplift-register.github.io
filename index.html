<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uplift Register</title>

  <!-- SEO / canonical -->
  <link rel="canonical" href="https://upliftregister.ai/early-access/" />

  <!-- Instant redirect -->
  <meta http-equiv="refresh" content="0; url=/early-access/" />

  <script>
    // Hard redirect fallback (more reliable than meta alone)
    window.location.href = "/early-access/";
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
    }

    .logo {
      display: inline-block;
      padding: 12px 24px;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin: 0;
      opacity: 0.75;
    }

    a {
      color: #111;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="logo">UPLIFT REGISTER</div>
    <p>
      Redirecting to Early Access…<br />
      <a href="/early-access/">Click here if not redirected</a>
    </p>
  </div>
</body>
</html>
